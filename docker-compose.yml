services:
  db:
    image: postgis/postgis:16-3.4
    container_name: rutazero_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: rutazero
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass123
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema_borrador.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rutazero"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
